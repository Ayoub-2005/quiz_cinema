<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
        }

        input {
            margin-right: 10px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Question {{ number }} / {{ total }}</h2>

    <form method="post">
        {% csrf_token %}

        <p>{{ question.text }}</p>

        <label><input type="radio" name="answer" value="{{ question.option1 }}"> {{ question.option1 }}</label>
        <label><input type="radio" name="answer" value="{{ question.option2 }}"> {{ question.option2 }}</label>
        <label><input type="radio" name="answer" value="{{ question.option3 }}"> {{ question.option3 }}</label>
        <label><input type="radio" name="answer" value="{{ question.option4 }}"> {{ question.option4 }}</label>

        <button type="submit">Suivant</button>
    </form>
</div>

</body>
</html>
